<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <title>Clarity</title>
            <link rel="stylesheet" href="styles.css">
        </head>

        <body>
            <div class="container">

                
                <div class="header">
                    <img src="icons/icon64.png" class="icon"> 
                    <h3 class="title">Clarity</h3>
                    <button id="settings-btn">
                        <img src="icons/settings.png" class="settings-icon">
                    </button>
                </div>

                
                <div class="input-section">
                    <input id="wordInput" placeholder="Enter word to blur..." />
                    <button id="saveWord">+ Add</button>
                </div>

                
                <ul id="wordList"></ul>

            </div>

            <script src="popup.js"></script>
        </body>
    </html>
