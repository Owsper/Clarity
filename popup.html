<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <title>Clarity</title>
            <link rel="stylesheet" href="styles.css">
        </head>

        <body>

            <!-- Main body content for popup starts here -->

            <div class="container">   <!-- Main container for the popup content -->

                <!-- Header section containing the logo and title -->

                <div class="header">  
                    <img src="icons/icon64.png" class="clarityLogo"> 
                    <h3 class="title">Clarity</h3>
                
                </div>

                <!-- Section for adding toggle switches for features -->

                <div class="toggle-section">  

                    <!-- Adblock toggle switch section -->

                    <div class="adblocksection">  
                        <label for="adBlock">
                            <img src="icons/adBlock.png" class="adBlockIcon">
                            <span class="adBlockSwitch">
                                <input type="checkbox" id="adBlock">
                                <span class="slider"></span>
                            </span>
                        </label>
                    </div>

                    <!-- Thirst trap toggle switch section -->

                    <div class="thirsttrapsection">
                        <label for="thirstTrap">
                            <img src="icons/thirstTrap.png" class="thirstTrapIcon">
                            <span class="thirstTrapSwitch">
                                <input type="checkbox" id="thirstTrap">
                                <span class="slider"></span>
                            </span>
                        </label>
                    </div>





                    
                </div>





                
  

                
                

            </div>

          

            <script src="popup.js"></script>
        </body>
    </html>
